<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conheça o Destino</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
  <link rel="stylesheet" href="destino-estilo.css">
</head>
<body class="bg-dark text-light">

  <header class="p-4 border-bottom border-secondary bg-black bg-opacity-30">
    <div class="container d-flex justify-content-between align-items-center">
      <a href="pesquisa.html" class="btn btn-outline-light rounded-pill">← Tentar Outro</a>
      <h1 id="titulo-lugar" class="m-0 fw-bold display-6">Carregando...</h1>
    </div>
  </header>

  <div class="container my-5">
    <div class="row justify-content-center mb-5">
      <div class="col-md-10">
        <img id="foto-lugar" src="" alt="Foto do local" class="img-fluid rounded shadow-lg w-100 placeholder-img">
      </div>
    </div>

    <div class="row g-4 justify-content-center">
      
      <div class="col-md-10">
        <div class="card bg-opacity-25 bg-light border-secondary">
          <div class="card-body d-flex justify-content-between align-items-center">
            <h5 class="m-0 fw-bold">📊 População Estimada da Região:</h5>
            <span id="populacao" class="fs-5 badge bg-primary">Carregando...</span>
          </div>
        </div>
      </div>

      <div class="col-md-5">
        <div class="card h-100 border-secondary">
          <div class="card-header bg-black bg-opacity-20 fw-bold text-info">📜 História Local</div>
          <div class="card-body">
            <p id="historia" class="card-text text-white-50">Carregando...</p>
          </div>
        </div>
      </div>

      <div class="col-md-5">
        <div class="card h-100 border-secondary">
          <div class="card-header bg-black bg-opacity-20 fw-bold text-warning">🌍 Costumes e Tradições</div>
          <div class="card-body">
            <p id="costumes" class="card-text text-white-50">Carregando...</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  
  <script src="destino-script.js"></script>
</body>
</html>
