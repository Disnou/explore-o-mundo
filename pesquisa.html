<!DOCTYPE html>
<html lang="pt-BR" class="h-100" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descubra pontos turísticos</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <link rel="stylesheet" href="estilo.css">
</head>
<body class="d-flex h-100 text-center text-bg-dark position-relative">

  <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
    
    <header class="mb-auto py-3">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-center w-100">
        <h3 class="mb-3 mb-md-0 fw-bold text-white fs-4 text-start">
          Vamos descobrir novos lugares
        </h3>
        
        <nav class="nav nav-masthead justify-content-center me-md-2">
          <a class="nav-link fw-bold py-1 px-0 active" aria-current="page" href="#">Home</a>
          <a class="nav-link fw-bold py-1 px-0 ms-4" href="#">Explorar</a>
          <a class="nav-link fw-bold py-1 px-0 ms-4" href="#">Contato</a>
        </nav>
      </div>
    </header>

    <main class="px-3">
      <h1 class="display-4 fw-bold text-white">Explore o Mundo.</h1>
      <p class="lead mb-5 text-white-50">
        Ao clicar no botão vamos direcionar você para um ponto turístico aleatório, o intuito desse site é que você conheça vários lugares espalhados pelo planeta!
      </p>
      
      <p class="lead">
        <button onclick="sortearDestino()" class="btn btn-lg btn-light fw-bold border-white bg-white text-dark shadow-sm px-5 py-3">
          Buscar Destino Aleatório
        </button>
      </p>
    </main>

    <footer class="mt-auto text-white-50">
      <p>Desenvolvido por Disnou, com <a href="https://getbootstrap.com/" class="text-white-50">Bootstrap</a>.</p>
    </footer>

  </div>

  <div class="position-absolute bottom-0 end-0 m-4 p-2 px-3 rounded text-white-50 local-tag">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <script src="script.js"></script>
</body>
</html>
